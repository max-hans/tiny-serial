name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lint: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip pkg-config libudev-dev build-essential

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: ${{ matrix.lint && 'clippy, rustfmt' || '' }}

      - name: Install dependencies
        run: bun install

      - name: Linting
        if: matrix.lint
        run: |
          cargo fmt -- --check
          cargo clippy
          bun run lint

      - name: Build Native
        run: bun run build:native --target ${{ matrix.target }}

      - name: Test
        shell: bash
        run: |
          # 1. Find the built .node file (works on Win/Mac/Linux)
          BINARY=$(ls *.node | head -n 1)

          if [ -z "$BINARY" ]; then
            echo "ERROR: No .node binary found!"
            ls -la
            exit 1
          fi

          echo "Force-loading native binary: $BINARY"

          # 2. This env var tells the NAPI-RS loader to skip all its
          # internal checks and just use this file.
          export NAPI_RS_NATIVE_LIBRARY_PATH="$(pwd)/$BINARY"

          # 3. Run the tests
          bun run test

      - name: Build TS
        run: bun run build:ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error

  publish:
    name: Publish
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Authenticate with NPM
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create NPM directories
        run: bun x napi create-npm-dirs
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Move artifacts
        run: bun run artifacts

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set provenance true
          # Check commit message for version tag
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "^[0-9]\+\.[0-9]\+\.[0-9]\+$"; then
            for dir in npm/*/; do
              npm publish "$dir" --access public
            done
            npm publish --access public
          elif echo "$COMMIT_MSG" | grep -q "^[0-9]\+\.[0-9]\+\.[0-9]\+"; then
            for dir in npm/*/; do
              npm publish "$dir" --tag next --access public
            done
            npm publish --tag next --access public
          else
            echo "Not a release commit ($COMMIT_MSG), skipping publish."
          fi
